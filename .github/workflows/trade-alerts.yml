name: Trade Alert Scanner

on:
  schedule:
    # London Kill Zone: 07:00–09:30 UTC (Mon–Fri)
    - cron: "0,15,30,45 7 * * 1-5"
    - cron: "0,15,30 9 * * 1-5"
    # New York Kill Zone: 12:00–14:00 UTC (Mon–Fri)
    - cron: "0,15,30,45 12,13 * * 1-5"
    # London Close Kill Zone: 15:00–16:00 UTC (Mon–Fri)
    - cron: "0,15,30,45 15 * * 1-5"
  workflow_dispatch: # Manual trigger from GitHub Actions UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger trade alert scanner
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.forexmb.us/api/cron/trade-alerts")

          echo "Response status: $response"

          if [ "$response" != "200" ]; then
            echo "Scanner returned non-200 status: $response"
            exit 1
          fi

          echo "Scanner completed successfully."
